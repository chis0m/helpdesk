name: Backend CI

on:
  push:
    branches: [vulnerable-baseline, secure-fix]
  pull_request:
    branches: [vulnerable-baseline, secure-fix]

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: make gocheck
        working-directory: backend
        run: make gocheck

      - name: make govuln
        working-directory: backend
        run: make govuln

  push-ecr:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ECR_PUBLIC_REGISTRY: public.ecr.aws/f8m4k2h6
      ECR_REPOSITORY: helpdesk-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set branch → Secrets Manager id
        id: meta
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            vulnerable-baseline)
              echo "secret_id=HELPDESK/VULN/SECRET" >> "$GITHUB_OUTPUT"
              echo "image_tag=vuln" >> "$GITHUB_OUTPUT"
              echo "env_local=.env.vuln.local" >> "$GITHUB_OUTPUT"
              ;;
            secure-fix)
              echo "secret_id=HELPDESK/SECURE/SECRET" >> "$GITHUB_OUTPUT"
              echo "image_tag=secure" >> "$GITHUB_OUTPUT"
              echo "env_local=.env.secure.local" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: $BRANCH" >&2
              exit 1
              ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch env JSON from Secrets Manager → branch env file
        working-directory: backend
        env:
          SECRET_ID: ${{ steps.meta.outputs.secret_id }}
          ENV_LOCAL: ${{ steps.meta.outputs.env_local }}
        run: |
          aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ID" \
            --query SecretString \
            --output text \
          | jq -r 'to_entries | map("\(.key)=\(.value)") | .[]' > "$ENV_LOCAL"

      - name: Log in to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "$ECR_PUBLIC_REGISTRY"

      - name: Build and push image
        working-directory: backend
        env:
          TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE="$ECR_PUBLIC_REGISTRY/$ECR_REPOSITORY:$TAG"
          docker build --build-arg "ENV_VARIANT=$TAG" -t "$IMAGE" .
          docker push "$IMAGE"
