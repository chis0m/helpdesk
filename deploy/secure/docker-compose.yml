name: helpdesk-secure

services:
  backend:
    image: public.ecr.aws/f8m4k2h6/helpdesk-backend:secure
    ports:
      - "127.0.0.1:5000:8080"
    environment:
      PORT: "8080"
      FRONTEND_URL: "https://secweb.chisomejim.site"
      MAIL_MAILER: "smtp"
      MAIL_HOST: "mailpit"
      MAIL_PORT: "1025"
      MAIL_FROM_ADDRESS: "support@chisomejim.site"
      MAIL_FROM_NAME: "SecureWeb HelpDesk"
    networks:
      - internal
      - helpdesk-shared
    restart: unless-stopped

  web:
    image: public.ecr.aws/f8m4k2h6/helpdesk-frontend:secure
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    name: helpdesk-secure-internal
  helpdesk-shared:
    name: helpdesk-shared
    external: true
