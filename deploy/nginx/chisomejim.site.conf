# Copy to /etc/nginx/sites-available/ on EC2, symlink to sites-enabled, then:
#   sudo nginx -t && sudo systemctl reload nginx
# TLS:
#   sudo certbot --nginx -d vulnweb.chisomejim.site -d secweb.chisomejim.site \
#     -d api.vulnweb.chisomejim.site -d api.secweb.chisomejim.site -d mail.chisomejim.site
#
# Requires app compose ports bound to 127.0.0.1 (see deploy/*/docker-compose.yml).

# Vuln stack — UI only
server {
    listen 80;
    listen [::]:80;
    server_name vulnweb.chisomejim.site;

    location / {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Vuln API
server {
    listen 80;
    listen [::]:80;
    server_name api.vulnweb.chisomejim.site;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

