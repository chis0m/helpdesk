name: helpdesk-mail

services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"
    environment:
      MP_DATABASE: /data/mailpit.db
    volumes:
      - ./data:/data
    networks:
      - helpdesk-shared
    restart: unless-stopped

networks:
  helpdesk-shared:
    name: helpdesk-shared
    driver: bridge
