<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;background:#f7f7f7;-webkit-font-smoothing:antialiased;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,sans-serif;color:#111111;line-height:1.5;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f7f7f7;padding:32px 16px 48px;">
<tr><td align="center">
<table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(17,17,17,0.06);">
<tr><td style="padding:20px 22px 16px;border-bottom:1px solid #e8e8e8;background:#ffffff;">
<p style="margin:0;font-size:16.8px;font-weight:600;letter-spacing:-0.02em;color:#111111;">Sign in to <span style="color:#0f7a3d;">{{.AppName}}</span></p>
<span style="display:inline-block;margin-top:8px;font-size:10.4px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#0f7a3d;background:#e8f9ef;padding:3px 9px;border-radius:9999px;">{{.Badge}}</span>
</td></tr>
<tr><td style="padding:24px 22px 26px;">
{{.Body}}
{{if and .ButtonLabel .ButtonURL}}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 16px;"><tr><td>
<a href="{{.ButtonURL}}" style="display:inline-block;background:#2ed06e;color:#0a0a0a !important;text-decoration:none;font-weight:600;font-size:14.4px;padding:10px 22px;border-radius:9999px;box-shadow:0 1px 2px rgba(17,17,17,0.06);">{{.ButtonLabel}}</a>
</td></tr></table>
{{end}}
{{if .LinkURL}}
<p style="margin:0;font-size:12.8px;color:#8a8a8a;word-break:break-all;line-height:1.45;">{{if .LinkHint}}{{.LinkHint}}<br>{{end}}<a href="{{.LinkURL}}" style="color:#0f7a3d;">{{.LinkURL}}</a></p>
{{end}}
</td></tr>
<tr><td style="border-top:1px solid #e8e8e8;padding:16px 22px;font-size:12px;color:#8a8a8a;background:#f2f2f2;">
{{.Footer}}
</td></tr>
</table>
</td></tr></table>
</body>
</html>
